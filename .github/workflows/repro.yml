name: Repro

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Uncached package shim prints version
        shell: pwsh
        run: |
          vp cache clean
          $output = vp run shim:uncached 2>&1 | Out-String
          Write-Output $output
          if (-not $output.Contains("6.0.0")) {
            throw "uncached package shim did not print 6.0.0"
          }
      - name: Cached direct Node CLI prints version
        shell: pwsh
        run: |
          vp cache clean
          $output = vp run node:cached 2>&1 | Out-String
          Write-Output $output
          if (-not $output.Contains("6.0.0")) {
            throw "cached direct Node CLI did not print 6.0.0"
          }
      - name: Cached package shim prints version
        shell: pwsh
        run: |
          vp cache clean
          $output = vp run shim:cached 2>&1 | Out-String
          Write-Output $output
          if (-not $output.Contains("6.0.0")) {
            throw "cached package shim did not print 6.0.0"
          }
