name: Repro

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install
      - name: Reset for uncached package shim
        shell: pwsh
        run: |
          Remove-Item .markers -Recurse -Force -ErrorAction SilentlyContinue
          vp cache clean
      - name: Run uncached package shim
        run: vp run shim:uncached
      - name: Diagnose uncached package shim
        shell: pwsh
        run: |
          if (Test-Path .markers/shim-uncached.json) {
            Get-Content .markers/shim-uncached.json
          } else {
            throw "marker-cli did not create .markers/shim-uncached.json"
          }
      - name: Reset for cached direct Node CLI
        shell: pwsh
        run: |
          Remove-Item .markers -Recurse -Force -ErrorAction SilentlyContinue
          vp cache clean
      - name: Run cached direct Node CLI
        run: vp run node:cached
      - name: Diagnose cached direct Node CLI
        shell: pwsh
        run: |
          if (Test-Path .markers/node-cached.json) {
            Get-Content .markers/node-cached.json
          } else {
            throw "marker-cli did not create .markers/node-cached.json"
          }
      - name: Reset for cached package shim with PATHEXT passthrough
        shell: pwsh
        run: |
          Remove-Item .markers -Recurse -Force -ErrorAction SilentlyContinue
          vp cache clean
      - name: Run cached package shim with PATHEXT passthrough
        run: vp run shim:cached-pathext
      - name: Diagnose cached package shim with PATHEXT passthrough
        shell: pwsh
        run: |
          if (Test-Path .markers/shim-cached-pathext.json) {
            Get-Content .markers/shim-cached-pathext.json
          } else {
            throw "marker-cli did not create .markers/shim-cached-pathext.json"
          }
      - name: Reset for cached package shim
        shell: pwsh
        run: |
          Remove-Item .markers -Recurse -Force -ErrorAction SilentlyContinue
          vp cache clean
      - name: Run cached package shim
        run: vp run shim:cached
      - name: Diagnose cached package shim
        shell: pwsh
        run: |
          if (Test-Path .markers/shim-cached.json) {
            Get-Content .markers/shim-cached.json
          } else {
            throw "marker-cli did not create .markers/shim-cached.json"
          }
